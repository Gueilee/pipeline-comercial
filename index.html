<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PIPELINE COMERCIAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
Chart.register(ChartDataLabels);
</script>

<style>
:root{
--grafite:#414042;
--lilas:#422c76;
--offwhite:#faf9f5;
--verde-sucesso: #28a745;
}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--offwhite);
color:var(--grafite);
overflow-x:hidden;
}

header{
background:white;
color:var(--lilas);
padding:15px 30px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.header-left{
display:flex;
align-items:center;
gap:15px;
}

.header-right{
display:flex;
gap:10px;
}

.logo{
height:40px;
width:auto;
}

/* Estilo dos Botões */
.btn-header {
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
    transition: opacity 0.2s;
}

.btn-novo-op { background-color: var(--lilas); color: white; }
.btn-aux { background-color: #f0f0f0; color: var(--grafite); border: 1px solid #ccc; }
.btn-header:hover { opacity: 0.8; }

.container{
padding:20px 30px;
max-width:1500px;
margin:auto;
}

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

select, input{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:12px;
}

.kpis{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:30px;
}

.kpi{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.kpi h3{
margin:0;
color:var(--lilas);
font-size:12px;
}

.kpi p{
font-size:16px;
font-weight:bold;
margin-top:6px;
}

.charts{
display:grid;
grid-template-columns:1fr;
gap:35px;
margin-bottom:35px;
}

canvas{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
height:420px !important;
max-height:420px !important;
width:100% !important;
}

.kanban{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.column{
padding:10px;
border-radius:10px;
min-width:unset;
}

.column h4{
text-align:center;
margin-top:0;
font-size:13px;
}

.card{
background:white;
padding:8px;
margin:6px 0;
border-radius:8px;
font-size:11px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* Modais */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
}

.modal-content {
    background-color: white;
    margin: 10% auto;
    padding: 25px;
    border-radius: 12px;
    width: 400px;
    max-width: 90%;
}

.modal-content h2 { color: var(--lilas); margin-top: 0; font-size: 18px; }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; margin-bottom: 4px; font-weight: bold; }
.form-group input, .form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
}

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
}

.btn-cancelar { background: #eee; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; }
.btn-salvar { background: var(--verde-sucesso); color: white; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }

</style>
</head>

<body>

<header>
    <div class="header-left">
        <img src="Pipeline.png" class="logo">
    </div>
    <div class="header-right">
        <button class="btn-header btn-aux" onclick="abrirModal('modalVendedor')">+ Vendedor</button>
        <button class="btn-header btn-aux" onclick="abrirModal('modalArea')">+ Área</button>
        <button class="btn-header btn-novo-op" onclick="abrirModal('modalOportunidade')">+ Nova Oportunidade</button>
    </div>
</header>

<div class="container">
    <div class="filters">
        <select id="filtroVendedor"><option value="">Todos Vendedores</option></select>
        <select id="filtroArea"><option value="">Todas Áreas</option></select>
        <select id="filtroStatus"><option value="">Todos Status</option></select>
    </div>

    <div class="kpis">
        <div class="kpi"><h3>Receita Ganha</h3><p id="receitaGanha">R$ 0</p></div>
        <div class="kpi"><h3>Pipeline Total (Anual)</h3><p id="pipelineTotal">R$ 0</p></div>
        <div class="kpi"><h3>MRR Total (Mensal)</h3><p id="mrrTotal">R$ 0</p></div>
        <div class="kpi"><h3>Conversão (%)</h3><p id="conversao">0%</p></div>
        <div class="kpi"><h3>Ticket Médio</h3><p id="ticket">R$ 0</p></div>
    </div>

    <div class="charts">
        <canvas id="chartStatus"></canvas>
        <canvas id="chartVendedor"></canvas>
    </div>

    <h2 style="font-size:15px;">KANBAN POR STATUS</h2>
    <div class="kanban" id="kanban"></div>
</div>

<div id="modalOportunidade" class="modal">
    <div class="modal-content" style="width: 480px;">
        <h2>Nova Oportunidade</h2>
        <form id="formOportunidade">
            <div class="form-group"><label>Cliente</label><input type="text" id="cliente" required></div>
            <div class="form-group"><label>Breve Descrição</label><input type="text" id="breve_descricao"></div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;"><label>Vendedor</label><select id="vendedor" required></select></div>
                <div class="form-group" style="flex: 1;"><label>Área</label><select id="area" required></select></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;"><label>Data Oportunidade</label><input type="date" id="data_oportunidade" required></div>
                <div class="form-group" style="flex: 1;"><label>Previsão Fechamento</label><input type="date" id="previsao_fechamento"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;"><label>Valor Estimado (Ano)</label><input type="number" step="0.01" id="valor_estimado_ano" required></div>
                <div class="form-group" style="flex: 1;"><label>Valor Mensal (MRR)</label><input type="number" step="0.01" id="valor_mensal_recorrente"></div>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status" required>
                    <option value="LEAD">LEAD</option>
                    <option value="AINDA FRIO">AINDA FRIO</option>
                    <option value="PROPOSTA ENVIADA - ACEITA">PROPOSTA ENVIADA - ACEITA</option>
                    <option value="EM ASSINATURA">EM ASSINATURA</option>
                    <option value="GANHO">GANHO</option>
                    <option value="PERDIDO">PERDIDO</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancelar" onclick="fecharModal('modalOportunidade')">Cancelar</button>
                <button type="submit" class="btn-salvar">Salvar Oportunidade</button>
            </div>
        </form>
    </div>
</div>

<div id="modalVendedor" class="modal">
    <div class="modal-content">
        <h2>Novo Vendedor</h2>
        <form id="formVendedor">
            <div class="form-group"><label>Nome do Vendedor</label><input type="text" id="nomeVendedor" required></div>
            <div class="modal-footer">
                <button type="button" class="btn-cancelar" onclick="fecharModal('modalVendedor')">Cancelar</button>
                <button type="submit" class="btn-salvar">Cadastrar</button>
            </div>
        </form>
    </div>
</div>

<div id="modalArea" class="modal">
    <div class="modal-content">
        <h2>Nova Área</h2>
        <form id="formArea">
            <div class="form-group"><label>Nome da Área</label><input type="text" id="nomeArea" required></div>
            <div class="modal-footer">
                <button type="button" class="btn-cancelar" onclick="fecharModal('modalArea')">Cancelar</button>
                <button type="submit" class="btn-salvar">Cadastrar</button>
            </div>
        </form>
    </div>
</div>

<script>
const SUPABASE_URL = "https://geojgcncmtbjebftosor.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdlb2pnY25jbXRiamViZnRvc29yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ3NjcsImV4cCI6MjA4ODI5MDc2N30.64DJvhw5O-1g05Pwmblth-rUK7-p1GZM-HPsaytB7BA";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

let base=[];
let charts={};

async function carregarDados(){
    const { data, error } = await supabaseClient.from('oportunidades').select('*').order('id', { ascending: true });
    if(error){ console.error("Erro:", error); return; }

    base = data.map(item => ({
        "Oportunidade": item.id,
        "Cliente": item.cliente,
        "Breve Descrição": item.breve_descricao,
        "Vendedor": item.vendedor,
        "Data da Oportunidade": item.data_oportunidade,
        "Previsão de Fechamento": item.previsao_fechamento,
        "Valor estimado no Ano": item.valor_estimado_ano,
        "Valor Mensal Recorrente": item.valor_mensal_recorrente,
        "Status": item.status,
        "Área": item.area
    }));

    popularFiltros();
    carregarListasAuxiliares();
    aplicarFiltros();
}

async function carregarListasAuxiliares() {
    const { data: vds } = await supabaseClient.from('vendedores').select('nome').eq('ativo', true).order('nome');
    const { data: ars } = await supabaseClient.from('areas').select('nome').eq('ativo', true).order('nome');

    const sV = document.getElementById('vendedor');
    const sA = document.getElementById('area');

    sV.innerHTML = '<option value="">Selecione...</option>';
    sA.innerHTML = '<option value="">Selecione...</option>';

    if(vds) vds.forEach(v => sV.innerHTML += `<option value="${v.nome}">${v.nome}</option>`);
    if(ars) ars.forEach(a => sA.innerHTML += `<option value="${a.nome}">${a.nome}</option>`);
}

// Funções dos Modais
function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

// Fechar modal ao clicar fora
window.onclick = (e) => { if(e.target.className === 'modal') e.target.style.display = 'none'; }

// Salvar Vendedor
document.getElementById('formVendedor').onsubmit = async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nomeVendedor').value;
    const { error } = await supabaseClient.from('vendedores').insert([{ nome, ativo: true }]);
    if (error) alert(error.message);
    else { fecharModal('modalVendedor'); document.getElementById('formVendedor').reset(); carregarListasAuxiliares(); }
};

// Salvar Área
document.getElementById('formArea').onsubmit = async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nomeArea').value;
    const { error } = await supabaseClient.from('areas').insert([{ nome, ativo: true }]);
    if (error) alert(error.message);
    else { fecharModal('modalArea'); document.getElementById('formArea').reset(); carregarListasAuxiliares(); }
};

// Salvar Oportunidade
document.getElementById('formOportunidade').onsubmit = async (e) => {
    e.preventDefault();
    const novaOp = {
        cliente: document.getElementById('cliente').value,
        breve_descricao: document.getElementById('breve_descricao').value,
        vendedor: document.getElementById('vendedor').value,
        data_oportunidade: document.getElementById('data_oportunidade').value,
        previsao_fechamento: document.getElementById('previsao_fechamento').value || null,
        valor_estimado_ano: parseFloat(document.getElementById('valor_estimado_ano').value),
        valor_mensal_recorrente: parseFloat(document.getElementById('valor_mensal_recorrente').value) || 0,
        status: document.getElementById('status').value,
        area: document.getElementById('area').value
    };
    const { error } = await supabaseClient.from('oportunidades').insert([novaOp]);
    if (error) alert(error.message);
    else { fecharModal('modalOportunidade'); document.getElementById('formOportunidade').reset(); carregarDados(); }
};

function formatarAbreviado(valor){
    if(!valor) return "R$ 0";
    let abs=Math.abs(valor);
    if(abs>=1e9) return "R$ "+(valor/1e9).toFixed(1).replace(".",",")+"B";
    if(abs>=1e6) return "R$ "+(valor/1e6).toFixed(1).replace(".",",")+"M";
    if(abs>=1e3) return "R$ "+(valor/1e3).toFixed(1).replace(".",",")+"K";
    return "R$ "+valor.toLocaleString('pt-BR');
}

function popularFiltros(){
    const vs = [...new Set(base.map(x=>x["Vendedor"]))].filter(Boolean);
    const as = [...new Set(base.map(x=>x["Área"]))].filter(Boolean);
    const ss = [...new Set(base.map(x=>x["Status"]))].filter(Boolean);

    filtroVendedor.innerHTML='<option value="">Todos Vendedores</option>';
    filtroArea.innerHTML='<option value="">Todas Áreas</option>';
    filtroStatus.innerHTML='<option value="">Todos Status</option>';

    vs.forEach(v => filtroVendedor.innerHTML+=`<option value="${v}">${v}</option>`);
    as.forEach(a => filtroArea.innerHTML+=`<option value="${a}">${a}</option>`);
    ss.forEach(s => filtroStatus.innerHTML+=`<option value="${s}">${s}</option>`);

    filtroVendedor.onchange=aplicarFiltros;
    filtroArea.onchange=aplicarFiltros;
    filtroStatus.onchange=aplicarFiltros;
}

function aplicarFiltros(){
    const filtrado = base.filter(r=>
        (!filtroVendedor.value||r["Vendedor"]==filtroVendedor.value) &&
        (!filtroArea.value||r["Área"]==filtroArea.value) &&
        (!filtroStatus.value||r["Status"]==filtroStatus.value)
    );
    calcular(filtrado);
}

function calcular(dados){
    let receita=0, pipeline=0, mrr=0, ganhos=0, perdidos=0;
    let statusCount={}, vendedorValor={};

    dados.forEach(r=>{
        let anual=parseFloat(r["Valor estimado no Ano"])||0;
        let mensal=parseFloat(r["Valor Mensal Recorrente"])||0;
        pipeline += anual;
        mrr += mensal;
        if(r["Status"]==="GANHO"){ receita+=anual; ganhos++; }
        if(r["Status"]==="PERDIDO"){ perdidos++; }
        statusCount[r["Status"]]=(statusCount[r["Status"]]||0)+1;
        vendedorValor[r["Vendedor"]] = (vendedorValor[r["Vendedor"]]||0)+anual;
    });

    document.getElementById("receitaGanha").innerText=formatarAbreviado(receita);
    document.getElementById("pipelineTotal").innerText=formatarAbreviado(pipeline);
    document.getElementById("mrrTotal").innerText=formatarAbreviado(mrr);
    document.getElementById("conversao").innerText=((ganhos/(ganhos+perdidos||1))*100).toFixed(1)+"%";
    document.getElementById("ticket").innerText=formatarAbreviado(ganhos?receita/ganhos:0);

    gerarGrafico("chartStatus","doughnut",statusCount,"Status das Oportunidades",true);
    gerarGraficoVendedor(vendedorValor);
    gerarKanban(dados);
}

function gerarGrafico(id,tipo,obj,titulo,mostrarLegenda){
    if(charts[id]) charts[id].destroy();
    charts[id]=new Chart(document.getElementById(id),{
        type:tipo,
        data:{labels:Object.keys(obj),datasets:[{data:Object.values(obj),backgroundColor:["#422c76","#ff6384","#36a2eb","#ffce56","#4bc0c0","#9966ff"]}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:titulo},legend:{display:mostrarLegenda}}}
    });
}

function gerarGraficoVendedor(obj){
    if(charts["chartVendedor"]) charts["chartVendedor"].destroy();
    let ranking=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    charts["chartVendedor"]=new Chart(document.getElementById("chartVendedor"),{
        type:"bar",
        data:{labels:ranking.map(r=>r[0]),datasets:[{data:ranking.map(r=>r[1]),backgroundColor:"#422c76"}]},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false}
    });
}

function gerarKanban(dados){
    kanban.innerHTML="";
    const ordem = ["LEAD", "AINDA FRIO", "PROPOSTA ENVIADA - ACEITA", "EM ASSINATURA", "GANHO", "PERDIDO"];
    ordem.forEach(status=>{
        let lista = dados.filter(d=>d["Status"]===status);
        let col=document.createElement("div");
        col.className="column";
        col.style.background="#f4f4f4";
        col.innerHTML=`<h4 style="border-bottom:2px solid var(--lilas)">${status}</h4>`;
        lista.forEach(item=>{
            let card=document.createElement("div");
            card.className="card";
            card.innerHTML=`<b>${item["Cliente"]}</b><br>${item["Vendedor"]}<br><b>${formatarAbreviado(item["Valor estimado no Ano"])}</b>`;
            col.appendChild(card);
        });
        kanban.appendChild(col);
    });
}

carregarDados();

</script>
</body>
</html>
