<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PIPELINE COMERCIAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<script>
Chart.register(ChartDataLabels);
</script>

<style>

:root{
--grafite:#414042;
--lilas:#422c76;
--offwhite:#faf9f5;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--offwhite);
color:var(--grafite);
}

header{
background:white;
color:var(--lilas);
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:40px;
}

.container{
padding:20px 30px;
max-width:1500px;
margin:auto;
}

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:12px;
}

.kpis{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:30px;
}

.kpi{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.kpi h3{
margin:0;
color:var(--lilas);
font-size:12px;
}

.kpi p{
font-size:16px;
font-weight:bold;
margin-top:6px;
}

.charts{
display:grid;
grid-template-columns:1fr;
gap:35px;
margin-bottom:35px;
}

canvas{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
height:420px !important;
max-height:420px !important;
width:100% !important;
}

.kanban{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.column{
padding:10px;
border-radius:10px;
}

.column h4{
text-align:center;
font-size:13px;
}

.card{
background:white;
padding:8px;
margin:6px 0;
border-radius:8px;
font-size:11px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:grab;
}

.ranking{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.rank-item{
display:flex;
justify-content:space-between;
padding:5px 0;
font-size:13px;
}

.login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.login input{
display:block;
margin-bottom:10px;
padding:8px;
width:200px;
}

button{
padding:8px 12px;
border:none;
background:#422c76;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="loginTela" class="login">
<div class="login-box">

<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>
</div>


<div id="app" style="display:none">

<header>
<img src="Pipeline.png" class="logo">
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="filters">
<select id="filtroVendedor"><option value="">Todos Vendedores</option></select>
<select id="filtroArea"><option value="">Todas Áreas</option></select>
<select id="filtroStatus"><option value="">Todos Status</option></select>
</div>


<div class="kpis">

<div class="kpi"><h3>Receita Ganha</h3><p id="receitaGanha">R$ 0</p></div>

<div class="kpi"><h3>Pipeline Total (Anual)</h3><p id="pipelineTotal">R$ 0</p></div>

<div class="kpi"><h3>MRR Total (Mensal)</h3><p id="mrrTotal">R$ 0</p></div>

<div class="kpi"><h3>Conversão</h3><p id="conversao">0%</p></div>

<div class="kpi"><h3>Ticket Médio</h3><p id="ticket">R$ 0</p></div>

</div>


<div class="ranking">

<h3>Ranking de Vendedores</h3>

<div id="ranking"></div>

</div>


<div class="charts">

<canvas id="chartStatus"></canvas>

<canvas id="chartVendedor"></canvas>

</div>


<h2 style="font-size:15px">KANBAN POR STATUS</h2>

<div class="kanban" id="kanban"></div>

</div>

</div>


<script>

const SUPABASE_URL="https://geojgcncmtbjebftosor.supabase.co"

const SUPABASE_KEY="SUA_ANON_KEY"

const {createClient}=supabase

const supabaseClient=createClient(SUPABASE_URL,SUPABASE_KEY)

let base=[]
let filtrado=[]
let charts={}

async function login(){

const {data,error}=await supabaseClient.auth.signInWithPassword({

email:email.value,

password:senha.value

})

if(error){alert("Erro login")}

else{

loginTela.style.display="none"

app.style.display="block"

carregarDados()

}

}

async function logout(){

await supabaseClient.auth.signOut()

location.reload()

}


async function carregarDados(){

const {data,error}=await supabaseClient

.from("oportunidades")

.select("*")

if(error){console.log(error)}

base=data

popularFiltros()

aplicarFiltros()

}


function formatarAbreviado(valor){

if(!valor)return "R$ 0"

if(valor>=1000000)return "R$ "+(valor/1000000).toFixed(1)+"M"

if(valor>=1000)return "R$ "+(valor/1000).toFixed(1)+"K"

return "R$ "+valor

}


function popularFiltros(){

let vendedores=[...new Set(base.map(x=>x.vendedor))]

let areas=[...new Set(base.map(x=>x.area))]

let status=[...new Set(base.map(x=>x.status))]

vendedores.forEach(v=>filtroVendedor.innerHTML+=`<option>${v}</option>`)

areas.forEach(a=>filtroArea.innerHTML+=`<option>${a}</option>`)

status.forEach(s=>filtroStatus.innerHTML+=`<option>${s}</option>`)

filtroVendedor.onchange=aplicarFiltros

filtroArea.onchange=aplicarFiltros

filtroStatus.onchange=aplicarFiltros

}


function aplicarFiltros(){

filtrado=base.filter(r=>

(!filtroVendedor.value||r.vendedor==filtroVendedor.value)&&

(!filtroArea.value||r.area==filtroArea.value)&&

(!filtroStatus.value||r.status==filtroStatus.value)

)

calcular()

}


function calcular(){

let receita=0,pipeline=0,mrr=0

let ganhos=0,perdidos=0

let statusCount={}

let vendedorValor={}

filtrado.forEach(r=>{

let anual=parseFloat(r.valor_estimado_ano)||0

let mensal=parseFloat(r.valor_mensal_recorrente)||0

pipeline+=anual

mrr+=mensal

if(r.status=="GANHO"){receita+=anual;ganhos++}

if(r.status=="PERDIDO"){perdidos++}

statusCount[r.status]=(statusCount[r.status]||0)+1

vendedorValor[r.vendedor]=(vendedorValor[r.vendedor]||0)+anual

})

receitaGanha.innerText=formatarAbreviado(receita)

pipelineTotal.innerText=formatarAbreviado(pipeline)

mrrTotal.innerText=formatarAbreviado(mrr)

conversao.innerText=((ganhos/(ganhos+perdidos||1))*100).toFixed(1)+"%"

ticket.innerText=formatarAbreviado(receita/ganhos||0)

gerarRanking(vendedorValor)

gerarGrafico("chartStatus","doughnut",statusCount)

gerarGraficoVendedor(vendedorValor)

gerarKanban()

}


function gerarRanking(obj){

ranking.innerHTML=""

let ordem=Object.entries(obj).sort((a,b)=>b[1]-a[1])

ordem.forEach((r,i)=>{

let medalha=i==0?"🥇":i==1?"🥈":i==2?"🥉":""

ranking.innerHTML+=`

<div class="rank-item">

<span>${medalha} ${r[0]}</span>

<span>${formatarAbreviado(r[1])}</span>

</div>

`

})

}


function gerarGrafico(id,tipo,obj){

if(charts[id])charts[id].destroy()

charts[id]=new Chart(document.getElementById(id),{

type:tipo,

data:{labels:Object.keys(obj),

datasets:[{data:Object.values(obj)}]},

options:{responsive:true,maintainAspectRatio:false}

})

}


function gerarGraficoVendedor(obj){

if(charts.chartVendedor)charts.chartVendedor.destroy()

let ranking=Object.entries(obj).sort((a,b)=>b[1]-a[1])

charts.chartVendedor=new Chart(chartVendedor,{

type:"bar",

data:{labels:ranking.map(x=>x[0]),

datasets:[{data:ranking.map(x=>x[1]),backgroundColor:"#422c76"}]},

options:{indexAxis:'y',responsive:true,maintainAspectRatio:false}

})

}


function gerarKanban(){

kanban.innerHTML=""

let grupos={}

filtrado.forEach(r=>{

if(!grupos[r.status])grupos[r.status]=[]

grupos[r.status].push(r)

})

Object.keys(grupos).forEach(status=>{

let col=document.createElement("div")

col.className="column"

col.innerHTML=`<h4>${status}</h4><div class="cards"></div>`

let cards=col.querySelector(".cards")

grupos[status].forEach(item=>{

let card=document.createElement("div")

card.className="card"

card.dataset.id=item.id

card.innerHTML=`<b>${item.cliente}</b><br>${formatarAbreviado(item.valor_estimado_ano)}`

cards.appendChild(card)

})

kanban.appendChild(col)

new Sortable(cards,{

group:"kanban",

animation:150,

onEnd:async function(evt){

let id=evt.item.dataset.id

let novoStatus=status

await supabaseClient

.from("oportunidades")

.update({status:novoStatus})

.eq("id",id)

}

})

})

}

</script>

</body>
</html>
