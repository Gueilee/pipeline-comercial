<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PIPELINE COMERCIAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
Chart.register(ChartDataLabels);
</script>

<style>
:root{
--grafite:#414042;
--lilas:#422c76;
--offwhite:#faf9f5;
}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--offwhite);
color:var(--grafite);
overflow-x:hidden;
}

header{
background:white;
color:var(--lilas);
padding:18px 30px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-left{
display:flex;
align-items:center;
gap:15px;
}

.logo{
height:40px;
width:auto;
}

/* BOTÃO NOVA OPORTUNIDADE */

.btnNova{
background:#422c76;
color:white;
border:none;
padding:8px 16px;
border-radius:8px;
font-size:12px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.container{
padding:20px 30px;
max-width:1500px;
margin:auto;
}

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:12px;
}

.kpis{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:30px;
}

.kpi{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.kpi h3{
margin:0;
color:var(--lilas);
font-size:12px;
}

.kpi p{
font-size:16px;
font-weight:bold;
margin-top:6px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.charts{
display:grid;
grid-template-columns:1fr;
gap:35px;
margin-bottom:35px;
}

canvas{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
height:420px !important;
max-height:420px !important;
width:100% !important;
}

.kanban{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
overflow:hidden;
}

.column{
padding:10px;
border-radius:10px;
min-width:unset;
}

.column h4{
text-align:center;
margin-top:0;
font-size:13px;
}

.card{
background:white;
padding:8px;
margin:6px 0;
border-radius:8px;
font-size:11px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* MODAL MODERNO */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:white;
width:420px;
border-radius:12px;
padding:22px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.modal-box h3{
margin-top:0;
color:#422c76;
}

.modal-box input{
width:100%;
margin-bottom:8px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:12px;
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:10px;
}

.btnSalvar{
background:#422c76;
color:white;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

.btnCancelar{
background:#ccc;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<header>

<div class="header-left">
<img src="Pipeline.png" class="logo">
</div>

<button class="btnNova" onclick="abrirModal()">+ Nova Oportunidade</button>

</header>

<div class="container">

<div class="filters">
<select id="filtroVendedor"><option value="">Todos Vendedores</option></select>
<select id="filtroArea"><option value="">Todas Áreas</option></select>
<select id="filtroStatus"><option value="">Todos Status</option></select>
</div>

<div class="kpis">
<div class="kpi"><h3>Receita Ganha</h3><p id="receitaGanha">R$ 0</p></div>
<div class="kpi"><h3>Pipeline Total (Anual)</h3><p id="pipelineTotal">R$ 0</p></div>
<div class="kpi"><h3>MRR Total (Mensal)</h3><p id="mrrTotal">R$ 0</p></div>
<div class="kpi"><h3>Conversão (%)</h3><p id="conversao">0%</p></div>
<div class="kpi"><h3>Ticket Médio</h3><p id="ticket">R$ 0</p></div>
</div>

<div class="charts">
<canvas id="chartStatus"></canvas>
<canvas id="chartVendedor"></canvas>
</div>

<h2 style="font-size:15px;">KANBAN POR STATUS</h2>
<div class="kanban" id="kanban"></div>

</div>


<!-- MODAL -->

<div class="modal" id="modalNova">

<div class="modal-box">

<h3>Nova Oportunidade</h3>

<input id="oportunidade" placeholder="Oportunidade">
<input id="cliente" placeholder="Cliente">
<input id="descricao" placeholder="Breve descrição">
<input id="vendedor" placeholder="Vendedor">
<input type="date" id="dataOportunidade">
<input type="date" id="previsaoFechamento">
<input type="number" id="valorAno" placeholder="Valor estimado no Ano">
<input type="number" id="valorMensal" placeholder="Valor Mensal Recorrente">
<input id="status" placeholder="Status">
<input id="area" placeholder="Área">

<div class="modal-actions">
<button class="btnCancelar" onclick="fecharModal()">Cancelar</button>
<button class="btnSalvar" onclick="salvarOportunidade()">Salvar</button>
</div>

</div>

</div>

<script>

function abrirModal(){
document.getElementById("modalNova").style.display="flex";
}

function fecharModal(){
document.getElementById("modalNova").style.display="none";
}

async function salvarOportunidade(){

const { error } = await supabaseClient
.from('oportunidades')
.insert([{
oportunidade:document.getElementById("oportunidade").value,
cliente:document.getElementById("cliente").value,
breve_descricao:document.getElementById("descricao").value,
vendedor:document.getElementById("vendedor").value,
data_oportunidade:document.getElementById("dataOportunidade").value,
previsao_fechamento:document.getElementById("previsaoFechamento").value,
valor_estimado_ano:document.getElementById("valorAno").value,
valor_mensal_recorrente:document.getElementById("valorMensal").value,
status:document.getElementById("status").value,
area:document.getElementById("area").value
}]);

if(error){
alert("Erro ao salvar");
console.log(error);
return;
}

fecharModal();
carregarDados();

}

let filtrado=[];

</body>
</html>
