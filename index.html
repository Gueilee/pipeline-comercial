<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PIPELINE COMERCIAL - CORRIGIDO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--grafite:#414042;
--lilas:#422c76;
--offwhite:#faf9f5;
--verde-sucesso: #28a745;
}

body{ margin:0; font-family:Segoe UI, sans-serif; background:var(--offwhite); color:var(--grafite); }

header{
background:white;
padding:15px 30px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.header-right{ display:flex; gap:10px; }

.btn-header {
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
}

.btn-novo-op { background-color: var(--lilas); color: white; }
.btn-aux { background-color: #f0f0f0; color: var(--grafite); border: 1px solid #ced4da; }

.container{ padding:20px 30px; max-width:1600px; margin:auto; }

.filters{ display:flex; gap:12px; margin-bottom:20px; }

.kpis{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:30px;
}

.kpi{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.kpi h3{ margin:0; font-size:12px; color:var(--lilas); }
.kpi p{ font-size:18px; font-weight:bold; margin: 5px 0 0 0; }

/* --- CORREÇÃO DEFINITIVA DOS GRÁFICOS --- */
.charts-wrapper {
    display: flex;
    gap: 20px;
    margin-bottom: 35px;
    align-items: flex-start;
}

.chart-container-pizza {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    width: 400px; /* Largura fixa para a pizza */
    height: 400px; /* Altura fixa para a pizza */
    display: flex;
    flex-direction: column;
    align-items: center;
}

.chart-container-barra {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    flex: 1; /* A barra ocupa o resto do espaço */
    height: 400px;
}

canvas { width: 100% !important; height: 100% !important; }

/* Kanban */
.kanban{ display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-top: 20px;}
.column{ background:#eaebed; padding:12px; border-radius:10px; min-height:300px; }
.column h4{ text-align:center; font-size:11px; margin-top:0; border-bottom:2px solid var(--lilas); padding-bottom:5px; text-transform: uppercase; }
.card{ background:white; padding:10px; margin:10px 0; border-radius:8px; font-size:11px; box-shadow:0 2px 5px rgba(0,0,0,0.1); border-left: 4px solid var(--lilas); }

/* Modais */
.modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
.modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 12px; width: 400px; position: relative;}
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
.form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
</style>
</head>

<body>

<header>
    <img src="Pipeline.png" style="height:40px;">
    <div class="header-right">
        <button class="btn-header btn-aux" onclick="abrirModal('modalVendedor')">+ Vendedor</button>
        <button class="btn-header btn-aux" onclick="abrirModal('modalArea')">+ Área</button>
        <button class="btn-header btn-novo-op" onclick="abrirModal('modalOportunidade')">+ Nova Oportunidade</button>
    </div>
</header>

<div class="container">
    <div class="filters">
        <select id="filtroVendedor"><option value="">Vendedores</option></select>
        <select id="filtroArea"><option value="">Áreas</option></select>
        <select id="filtroStatus"><option value="">Status</option></select>
    </div>

    <div class="kpis">
        <div class="kpi"><h3>Receita Ganha</h3><p id="receitaGanha">R$ 0</p></div>
        <div class="kpi"><h3>Pipeline Total</h3><p id="pipelineTotal">R$ 0</p></div>
        <div class="kpi"><h3>MRR Total</h3><p id="mrrTotal">R$ 0</p></div>
        <div class="kpi"><h3>Conversão</h3><p id="conversao">0%</p></div>
        <div class="kpi"><h3>Ticket Médio</h3><p id="ticket">R$ 0</p></div>
    </div>

    <div class="charts-wrapper">
        <div class="chart-container-pizza">
            <h4 style="margin:0 0 10px 0; font-size:14px;">Status das Oportunidades</h4>
            <canvas id="chartStatus"></canvas>
        </div>
        <div class="chart-container-barra">
            <h4 style="margin:0 0 10px 0; font-size:14px;">Ranking por Vendedor</h4>
            <canvas id="chartVendedor"></canvas>
        </div>
    </div>

    <h2 style="font-size:16px; margin-bottom:15px;">Pipeline / Kanban</h2>
    <div class="kanban" id="kanban"></div>
</div>

<div id="modalVendedor" class="modal">
    <div class="modal-content">
        <h3>Novo Vendedor</h3>
        <form id="formVendedor">
            <div class="form-group"><label>Nome</label><input type="text" id="nomeVendedor" required></div>
            <div class="modal-footer">
                <button type="button" onclick="fecharModal('modalVendedor')">Cancelar</button>
                <button type="submit" class="btn-novo-op">Salvar Vendedor</button>
            </div>
        </form>
    </div>
</div>

<div id="modalArea" class="modal">
    <div class="modal-content">
        <h3>Nova Área</h3>
        <form id="formArea">
            <div class="form-group"><label>Nome da Área</label><input type="text" id="nomeArea" required></div>
            <div class="modal-footer">
                <button type="button" onclick="fecharModal('modalArea')">Cancelar</button>
                <button type="submit" class="btn-novo-op">Salvar Área</button>
            </div>
        </form>
    </div>
</div>

<div id="modalOportunidade" class="modal">
    <div class="modal-content" style="width:450px;">
        <h3>Nova Oportunidade</h3>
        <form id="formOportunidade">
            <div class="form-group"><label>Cliente</label><input type="text" id="cliente" required></div>
            <div style="display:flex; gap:10px">
                <div class="form-group" style="flex:1"><label>Vendedor</label><select id="vendedor" required></select></div>
                <div class="form-group" style="flex:1"><label>Área</label><select id="area" required></select></div>
            </div>
            <div style="display:flex; gap:10px">
                <div class="form-group" style="flex:1"><label>Valor Anual</label><input type="number" step="0.01" id="vAno" required></div>
                <div class="form-group" style="flex:1">
                    <label>Status</label>
                    <select id="status" required>
                        <option value="LEAD">LEAD</option>
                        <option value="AINDA FRIO">AINDA FRIO</option>
                        <option value="PROPOSTA ENVIADA - ACEITA">PROPOSTA ENVIADA - ACEITA</option>
                        <option value="EM ASSINATURA">EM ASSINATURA</option>
                        <option value="GANHO">GANHO</option>
                        <option value="PERDIDO">PERDIDO</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" onclick="fecharModal('modalOportunidade')">Cancelar</button>
                <button type="submit" class="btn-novo-op">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script>
const SUPABASE_URL = "https://geojgcncmtbjebftosor.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdlb2pnY25jbXRiamViZnRvc29yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ3NjcsImV4cCI6MjA4ODI5MDc2N30.64DJvhw5O-1g05Pwmblth-rUK7-p1GZM-HPsaytB7BA";
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

let base=[];
let charts={};

function abrirModal(id){ document.getElementById(id).style.display='block'; }
function fecharModal(id){ document.getElementById(id).style.display='none'; }

async function carregarAuxiliares(){
    const { data: v } = await supabaseClient.from('vendedores').select('nome').eq('ativo', true).order('nome');
    const { data: a } = await supabaseClient.from('areas').select('nome').eq('ativo', true).order('nome');
    const sV = document.getElementById('vendedor');
    const sA = document.getElementById('area');
    sV.innerHTML = '<option value="">Selecione...</option>';
    sA.innerHTML = '<option value="">Selecione...</option>';
    v?.forEach(i => sV.innerHTML += `<option value="${i.nome}">${i.nome}</option>`);
    a?.forEach(i => sA.innerHTML += `<option value="${i.nome}">${i.nome}</option>`);
}

// SOLUÇÃO DO ERRO DE DUPLICATE KEY:
// Se o erro persistir, execute este comando no SQL Editor do Supabase:
// SELECT setval(pg_get_serial_sequence('vendedores', 'id'), coalesce(max(id),0) + 1, false) FROM vendedores;

document.getElementById('formVendedor').onsubmit = async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nomeVendedor').value;
    // Inserimos apenas o nome, o ID é automático.
    const { error } = await supabaseClient.from('vendedores').insert([{ nome, ativo: true }]);
    if(error) {
        alert("Erro Supabase: " + error.message + "\n\nSe o erro for 'duplicate key', reinicie a contagem (Identity) no painel do Supabase.");
    } else {
        fecharModal('modalVendedor');
        document.getElementById('formVendedor').reset();
        carregarAuxiliares();
    }
};

document.getElementById('formArea').onsubmit = async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nomeArea').value;
    const { error } = await supabaseClient.from('areas').insert([{ nome, ativo: true }]);
    if(error) alert("Erro: " + error.message);
    else { fecharModal('modalArea'); document.getElementById('formArea').reset(); carregarAuxiliares(); }
};

document.getElementById('formOportunidade').onsubmit = async (e) => {
    e.preventDefault();
    const payload = {
        cliente: document.getElementById('cliente').value,
        vendedor: document.getElementById('vendedor').value,
        area: document.getElementById('area').value,
        valor_estimado_ano: parseFloat(document.getElementById('vAno').value),
        status: document.getElementById('status').value,
        data_oportunidade: new Date().toISOString().split('T')[0]
    };
    const { error } = await supabaseClient.from('oportunidades').insert([payload]);
    if(error) alert(error.message); else { fecharModal('modalOportunidade'); carregarDados(); }
};

async function carregarDados(){
    const { data } = await supabaseClient.from('oportunidades').select('*');
    base = data || [];
    renderizar();
}

function renderizar(){
    let ganho = 0, statusCont = {}, vendVal = {};
    base.forEach(r => {
        const v = r.valor_estimado_ano || 0;
        if(r.status === 'GANHO') ganho += v;
        statusCont[r.status] = (statusCont[r.status] || 0) + 1;
        vendVal[r.vendedor || "Sem Vendedor"] = (vendVal[r.vendedor || "Sem Vendedor"] || 0) + v;
    });

    document.getElementById('receitaGanha').innerText = "R$ " + ganho.toLocaleString('pt-BR');

    // GRÁFICO DE STATUS - TRAVADO
    if(charts.st) charts.st.destroy();
    charts.st = new Chart(document.getElementById('chartStatus'), {
        type: 'doughnut',
        data: { labels: Object.keys(statusCont), datasets: [{ data: Object.values(statusCont), backgroundColor: ['#422c76','#ff6384','#36a2eb','#ffce56','#28a745','#6c757d'] }]},
        options: { 
            maintainAspectRatio: false,
            responsive: true,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
        }
    });

    // GRÁFICO DE VENDEDOR
    if(charts.vd) charts.vd.destroy();
    charts.vd = new Chart(document.getElementById('chartVendedor'), {
        type: 'bar',
        data: { labels: Object.keys(vendVal), datasets: [{ label: 'Valor R$', data: Object.values(vendVal), backgroundColor: '#422c76' }]},
        options: { indexAxis: 'y', maintainAspectRatio: false, responsive: true }
    });

    // KANBAN
    const kan = document.getElementById('kanban');
    kan.innerHTML = "";
    const colunas = ["LEAD", "AINDA FRIO", "PROPOSTA ENVIADA - ACEITA", "EM ASSINATURA", "GANHO", "PERDIDO"];
    colunas.forEach(s => {
        const col = document.createElement('div');
        col.className = 'column';
        col.innerHTML = `<h4>${s}</h4>`;
        base.filter(f => f.status === s).forEach(item => {
            col.innerHTML += `<div class="card"><b>${item.cliente}</b><br>R$ ${item.valor_estimado_ano.toLocaleString('pt-BR')}</div>`;
        });
        kan.appendChild(col);
    });
}

carregarAuxiliares();
carregarDados();
</script>
</body>
</html>
