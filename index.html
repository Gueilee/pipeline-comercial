<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PIPELINE COMERCIAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
Chart.register(ChartDataLabels);
</script>

<style>
:root{
--grafite:#414042;
--lilas:#422c76;
--offwhite:#faf9f5;
}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--offwhite);
color:var(--grafite);
overflow-x:hidden;
}

header{
background:white;
padding:18px 30px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
height:40px;
}

.btn{
background:#422c76;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.container{
padding:20px 30px;
max-width:1500px;
margin:auto;
}

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:12px;
}

.kpis{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:30px;
}

.kpi{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.kpi h3{
margin:0;
color:#422c76;
font-size:12px;
}

.kpi p{
font-size:16px;
font-weight:bold;
margin-top:6px;
}

.charts{
display:grid;
grid-template-columns:1fr;
gap:35px;
margin-bottom:35px;
}

canvas{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
height:420px !important;
}

.kanban{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.column{
padding:10px;
border-radius:10px;
}

.column h4{
text-align:center;
}

.card{
background:white;
padding:8px;
margin:6px 0;
border-radius:8px;
font-size:11px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:400px;
display:flex;
flex-direction:column;
gap:10px;
}

.modal input, .modal select{
padding:6px;
}

</style>
</head>

<body>

<header>

<img src="Pipeline.png" class="logo">

<button class="btn" onclick="novaOportunidade()">
+ NOVA OPORTUNIDADE
</button>

</header>

<div class="container">

<div class="filters">
<select id="filtroVendedor"><option value="">Todos Vendedores</option></select>
<select id="filtroArea"><option value="">Todas Áreas</option></select>
<select id="filtroStatus"><option value="">Todos Status</option></select>
</div>

<div class="kpis">
<div class="kpi"><h3>Receita Ganha</h3><p id="receitaGanha">R$ 0</p></div>
<div class="kpi"><h3>Pipeline Total</h3><p id="pipelineTotal">R$ 0</p></div>
<div class="kpi"><h3>MRR</h3><p id="mrrTotal">R$ 0</p></div>
<div class="kpi"><h3>Conversão</h3><p id="conversao">0%</p></div>
<div class="kpi"><h3>Ticket Médio</h3><p id="ticket">R$ 0</p></div>
</div>

<div class="charts">
<canvas id="chartStatus"></canvas>
<canvas id="chartVendedor"></canvas>
</div>

<h2>KANBAN</h2>
<div class="kanban" id="kanban"></div>

</div>


<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<input id="cliente" placeholder="Cliente">

<input id="descricao" placeholder="Descrição">

<select id="vendedor"></select>

<select id="area"></select>

<select id="status"></select>

<input id="valor_anual" placeholder="Valor anual">

<input id="valor_mensal" placeholder="Valor mensal">

<button class="btn" onclick="salvar()">SALVAR</button>

<button onclick="deletar()">DELETAR</button>

<button onclick="fechar()">CANCELAR</button>

</div>

</div>

<script>

const { createClient } = supabase;

const supabaseClient = createClient(
"https://geojgcncmtbjebftosor.supabase.co",
"eyJhbGc..."
);

let base=[];
let filtrado=[];
let editando=null;
let charts={};

async function carregarDados(){

const { data } = await supabaseClient
.from("oportunidades")
.select("*");

base=data;

popularFiltros();
aplicarFiltros();

}

function novaOportunidade(){

editando=null;

document.getElementById("modal").style.display="flex";

}

function abrir(item){

editando=item.id;

cliente.value=item.cliente;
descricao.value=item.breve_descricao;
vendedor.value=item.vendedor;
area.value=item.area;
status.value=item.status;
valor_anual.value=item.valor_estimado_ano;
valor_mensal.value=item.valor_mensal_recorrente;

modal.style.display="flex";

}

function fechar(){

modal.style.display="none";

}

async function salvar(){

let registro={
cliente:cliente.value,
breve_descricao:descricao.value,
vendedor:vendedor.value,
area:area.value,
status:status.value,
valor_estimado_ano:valor_anual.value,
valor_mensal_recorrente:valor_mensal.value
};

if(editando){

await supabaseClient
.from("oportunidades")
.update(registro)
.eq("id",editando);

}else{

await supabaseClient
.from("oportunidades")
.insert(registro);

}

fechar();
carregarDados();

}

async function deletar(){

if(!editando) return;

await supabaseClient
.from("oportunidades")
.delete()
.eq("id",editando);

fechar();
carregarDados();

}

function popularFiltros(){

let vendedores=[...new Set(base.map(x=>x.vendedor))];
let areas=[...new Set(base.map(x=>x.area))];
let status=[...new Set(base.map(x=>x.status))];

filtroVendedor.innerHTML='<option value="">Todos</option>';
filtroArea.innerHTML='<option value="">Todas</option>';
filtroStatus.innerHTML='<option value="">Todos</option>';

vendedor.innerHTML="";
area.innerHTML="";
statusSelect="";

vendedores.forEach(v=>{
filtroVendedor.innerHTML+=`<option>${v}</option>`;
vendedor.innerHTML+=`<option>${v}</option>`;
});

areas.forEach(a=>{
filtroArea.innerHTML+=`<option>${a}</option>`;
area.innerHTML+=`<option>${a}</option>`;
});

status.forEach(s=>{
filtroStatus.innerHTML+=`<option>${s}</option>`;
status.innerHTML+=`<option>${s}</option>`;
});

filtroVendedor.onchange=aplicarFiltros;
filtroArea.onchange=aplicarFiltros;
filtroStatus.onchange=aplicarFiltros;

}

function aplicarFiltros(){

filtrado=base.filter(r=>

(!filtroVendedor.value||r.vendedor==filtroVendedor.value) &&
(!filtroArea.value||r.area==filtroArea.value) &&
(!filtroStatus.value||r.status==filtroStatus.value)

);

calcular();

}

function calcular(){

let receita=0;
let pipeline=0;
let mrr=0;
let ganhos=0;
let perdidos=0;

let statusCount={};
let vendedorValor={};

filtrado.forEach(r=>{

let anual=Number(r.valor_estimado_ano)||0;
let mensal=Number(r.valor_mensal_recorrente)||0;

pipeline+=anual;
mrr+=mensal;

if(r.status==="GANHO"){receita+=anual;ganhos++}
if(r.status==="PERDIDO"){perdidos++}

statusCount[r.status]=(statusCount[r.status]||0)+1;

vendedorValor[r.vendedor]=(vendedorValor[r.vendedor]||0)+anual;

});

receitaGanha.innerText="R$ "+receita.toLocaleString();
pipelineTotal.innerText="R$ "+pipeline.toLocaleString();
mrrTotal.innerText="R$ "+mrr.toLocaleString();
conversao.innerText=((ganhos/(ganhos+perdidos||1))*100).toFixed(1)+"%";
ticket.innerText="R$ "+(ganhos?receita/ganhos:0).toLocaleString();

gerarGrafico("chartStatus","doughnut",statusCount);
gerarGraficoVendedor(vendedorValor);

gerarKanban();

}

function gerarGrafico(id,tipo,obj){

if(charts[id]) charts[id].destroy();

charts[id]=new Chart(document.getElementById(id),{

type:tipo,

data:{
labels:Object.keys(obj),
datasets:[{
data:Object.values(obj),
backgroundColor:["#ff6384","#36a2eb","#ffce56","#4bc0c0","#9966ff"]
}]
}

});

}

function gerarGraficoVendedor(obj){

if(charts.chartVendedor) charts.chartVendedor.destroy();

charts.chartVendedor=new Chart(chartVendedor,{

type:"bar",

data:{
labels:Object.keys(obj),
datasets:[{
data:Object.values(obj),
backgroundColor:"#422c76"
}]
},

options:{indexAxis:"y"}

});

}

function gerarKanban(){

kanban.innerHTML="";

let grupos={};

filtrado.forEach(r=>{

if(!grupos[r.status]) grupos[r.status]=[];

grupos[r.status].push(r);

});

Object.keys(grupos).forEach(status=>{

let col=document.createElement("div");

col.className="column";

col.style.backgroundColor="hsl("+Math.random()*360+",70%,85%)";

col.innerHTML="<h4>"+status+"</h4>";

grupos[status].forEach(item=>{

let card=document.createElement("div");

card.className="card";

card.onclick=()=>abrir(item);

card.innerHTML="<b>"+item.cliente+"</b><br>R$ "+(item.valor_estimado_ano||0).toLocaleString();

col.appendChild(card);

});

kanban.appendChild(col);

});

}

carregarDados();

</script>

</body>
</html>
